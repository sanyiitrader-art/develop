name: Build ChartMind AI APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          pip install flet==0.21.2
          pip install groq Pillow python-dotenv

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build APK
        run: |
          export PIP_NO_BUILD_ISOLATION=1
          flet build apk --project "ChartMind AI"

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChartMind-AI-APK
          path: |
            build/apk/*.apk
            **/*.apk
          if-no-files-found: warn